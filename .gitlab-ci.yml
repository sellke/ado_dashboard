---
include:
  - local: pipeline.yml

variables:
  K8S_DIR: "k8s"
  PROJECT: ado-dashboard
  CI_REGISTRY_IMAGE: "${CI_REGISTRY}/livelink-ado-dashboard"
  NODE_IMAGE: case.artifacts.medtronic.com/ext-docker-hub-remote/node:22-bookworm-slim
  # Base URL only — CI uses ARTIFACTORY_USERNAME/ARTIFACTORY_PASSWORD (or lowercase equivalents)
  PRISMA_ENGINES_MIRROR: "https://case.artifacts.medtronic.com/artifactory/operations_innovation-generic-dev-local"
  PRISMA_ENGINES_CHECKSUM_IGNORE_MISSING: "1"

stages:
  - lint
  - check
  - test
  - build
  - release
  - deploy

.nonprod:
  variables:
    PROMOTION_LEVEL: nonprod
  environment:
    name: TF-aipmeccsdf-2-dev
    deployment_tier: staging

.prod:
  variables:
    PROMOTION_LEVEL: prod
  environment:
    name: TF-aipmeccsdf-prd
    deployment_tier: production
