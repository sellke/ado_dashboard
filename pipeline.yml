---
include:
  - file: containers.yml
    project: Operations_Innovation/devops/semantic-release
    ref: main

lint:commit:
  extends: [.lint:commit]
  tags:
    - livelink

semantic-release-conditions:
  extends: [.semantic-release-conditions]
  tags:
    - livelink

test:
  stage: test
  tags:
    - livelink
  image: $NODE_IMAGE
  services:
    - name: case.artifacts.medtronic.com/ext-docker-hub-remote/postgres:16-alpine
      alias: postgres
  variables:
    POSTGRES_USER: postgres
    POSTGRES_PASSWORD: postgres
    POSTGRES_DB: nextapp
    DATABASE_URL: "postgresql://postgres:postgres@postgres:5432/nextapp?schema=public"
  before_script:
    - apt-get update && apt-get install -y --no-install-recommends openssl ca-certificates
    - corepack enable
    - |
      export ARTIFACTORY_USERNAME="${artifactory_username:-${ARTIFACTORY_USERNAME:-}}"
      export ARTIFACTORY_PASSWORD="${artifactory_password:-${ARTIFACTORY_PASSWORD:-}}"
      if [ -z "${ARTIFACTORY_USERNAME}" ] || [ -z "${ARTIFACTORY_PASSWORD}" ]; then
        echo "ERROR: Set GitLab CI variables artifactory_username/artifactory_password or ARTIFACTORY_USERNAME/ARTIFACTORY_PASSWORD."
        exit 1
      fi
      export PRISMA_ENGINES_CHECKSUM_IGNORE_MISSING="${PRISMA_ENGINES_CHECKSUM_IGNORE_MISSING:-1}"
      ENCODED_PASSWORD="$(node -e "console.log(encodeURIComponent(process.env.ARTIFACTORY_PASSWORD))")"
      MIRROR_HOST="${PRISMA_ENGINES_MIRROR#https://}"
      export PRISMA_ENGINES_MIRROR="https://${ARTIFACTORY_USERNAME}:${ENCODED_PASSWORD}@${MIRROR_HOST}"
      echo "Using Prisma engines from Artifactory: operations_innovation-generic-dev-local"

      for attempt in 1 2 3 4 5; do
        echo "pnpm install attempt ${attempt}/5"
        pnpm install --frozen-lockfile && break
        if [ "$attempt" -eq 5 ]; then
          echo "pnpm install failed after 5 attempts"
          exit 1
        fi
        sleep 10
      done

      for attempt in 1 2 3 4 5; do
        echo "prisma migrate deploy attempt ${attempt}/5"
        pnpm exec prisma migrate deploy && break
        if [ "$attempt" -eq 5 ]; then
          echo "prisma migrate deploy failed after 5 attempts"
          exit 1
        fi
        sleep 10
      done
  script:
    - pnpm test
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH && $CI_COMMIT_MESSAGE =~ /^chore\(release\):/
      when: never
    - if: $CI_COMMIT_TAG
      when: never
    - when: on_success

build-image:
  extends: .image-build
  tags:
    - livelink
  needs:
    - job: semantic-release-conditions
    - job: test
  before_script:
    - echo VERSION=${VERSION} > version.env
    - VERSION=${CI_COMMIT_TAG:=$VERSION-SNAPSHOT}
    - BUILD_ARGS="--build-arg PRISMA_ENGINES_MIRROR=${PRISMA_ENGINES_MIRROR} --build-arg PRISMA_ENGINES_CHECKSUM_IGNORE_MISSING=${PRISMA_ENGINES_CHECKSUM_IGNORE_MISSING} --build-arg ARTIFACTORY_USERNAME=${ARTIFACTORY_USERNAME} --build-arg ARTIFACTORY_PASSWORD=${ARTIFACTORY_PASSWORD}"
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH && $CI_COMMIT_MESSAGE =~ /^chore\(release\):/
      when: never
    - if: $CI_COMMIT_TAG
      when: never
    - if: $CI_PIPELINE_SOURCE == "merge_request_event" && $CI_MERGE_REQUEST_TARGET_BRANCH_NAME == $CI_DEFAULT_BRANCH
      changes:
        - "**/*"
        - "!k8s/**/*"
        - "!infrastructure/**/k8s/**/*"
      when: on_success
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      changes:
        - "**/*"
        - "!k8s/**/*"
        - "!infrastructure/**/k8s/**/*"
      when: on_success
    - if: $CI_COMMIT_BRANCH == "dev"
      when: on_success
    - when: on_success

semantic-release:
  extends: [.semantic-release]
  tags:
    - livelink

tag-image:
  extends: .image-tag
  tags:
    - livelink

nonprod-deploy:
  extends:
    - .nonprod
    - .deploy-local
  tags:
    - livelink
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH && $CI_COMMIT_MESSAGE =~ /^chore\(release\):/
      when: never
    - if: $CI_COMMIT_TAG
      when: manual
    - if: $CI_COMMIT_BRANCH == "dev"

prod-deploy:
  extends:
    - .prod
    - .deploy-local
  tags:
    - livelink
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH && $CI_COMMIT_MESSAGE =~ /^chore\(release\):/
      when: never
    - if: $CI_COMMIT_TAG
      when: manual
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      when: manual
